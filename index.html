<!DOCTYPE html>
<html lang="en">

<head>

         :root {
            --bg: #020408;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* FIXED: Changed from overflow: hidden to allow mobile scrolling */
            overflow-x: hidden;
            overflow-y: auto;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
        }
        /* Cinematic Background Overlay */
        
        .overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.8));
            pointer-events: none;
        }
        /* Responsive Grid System */
        
        .hub-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            /* Mobile default */
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Tablet (2 columns) */
        
        @media (min-width: 640px) {
            .hub-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
        }
        /* Desktop/TV (3 columns) */
        
        @media (min-width: 1024px) {
            .hub-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            body {
                justify-content: center;
            }
            /* Only center vertically on large screens */
        }
        /* Focus Cards */
        
        .tv-card {
            position: relative;
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 28px;
            padding: 30px 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            outline: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
        }
        /* Hover/Focus States */
        
        .tv-card:hover,
        .tv-card:focus {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 40px -10px var(--accent);
            z-index: 10;
        }
        
        .icon-container {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
            color: var(--accent);
            transition: 0.5s;
        }
        
        .tv-card:hover .icon-container,
        .tv-card:focus .icon-container {
            background: var(--accent);
            color: white;
            transform: rotateY(180deg);
        }
        /* Status Light */
        
        .status-light {
            position: absolute;
            top: 15px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            font-weight: 800;
            color: #10b981;
        }
        
        .pulse-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                opacity: 1;
            }
        }
        /* Accent Colors */
        
        .blue {
            --accent: #3b82f6;
        }
        
        .emerald {
            --accent: #10b981;
        }
        
        .purple {
            --accent: #a855f7;
        }
        
        .amber {
            --accent: #f59e0b;
        }
        /* Typography Scaling */
        
        .header-title {
            font-size: clamp(3rem, 10vw, 5rem);
            /* Scales based on screen size */
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
    </style>
</head>
